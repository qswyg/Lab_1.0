<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Лабораторна робота №1 - Кабінет студента</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Кабінет студента (Варіант №10)</h1>
        </header>
        <section id="user-section" class="card">
    <h2>Реєстрація</h2>
    <form id="user-form">
        <div class="field">
            <label for="userName">Ім'я:</label>
            <input type="text" id="userName" placeholder="Твоє ім'я">
            <span id="userName-error" class="error-message"></span> 
        </div>
        <div class="field">
            <label for="userEmail">Email:</label>
            <input type="email" id="userEmail" placeholder="Email (напр. @example.com)">
            <span id="userEmail-error" class="error-message"></span>
        </div>
        <button type="submit">Зареєструватися</button>
    </form>
    <div id="user-status"></div>
</section>
<div id="customConfirm" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Підтвердження</h3>
        <p>Ви впевнені, що хочете видалити цю нотатку?</p>
        <div class="modal-buttons">
            <button id="confirmYes" class="delete-btn">Видалити</button>
            <button id="confirmNo" class="btn-submit">Скасувати</button>
        </div>
    </div>
</div>
    
<hr>

        <main class="main-layout">
            
            <section id="create-section">
                <h2 id="form-title">Додати нотатку</h2>
                
                <form id="createForm" novalidate>
                    
                    <input type="hidden" id="edit-id">
                    
                    <div class="field">
                        <label for="courseSelect">Навчальні Дисципліни</label>
                        <select id="courseSelect">
                            <option value="">Оберіть дисципліну</option>
                            <option value="1">Спеціальні математичні методи в інформаційній та кібербезпеці</option>
                            <option value="2">Архітектура комп'ютерних систем</option>
                            <option value="3">Математичні основи в інформаційній та кібербезпеці</option>
                            <option value="4">Основи алгоритмізації та програмування</option>
                        </select>
                        <p id="courseError" class="error-text"></p>
                    </div>

                    <div class="field">
                        <label for="titleInput">Назва нотатки</label>
                        <input id="titleInput" type="text" placeholder>
                        <p id="titleError" class="error-text"></p>
                    </div>
                    

                    <div class="field">
                        <label for="noteText">Текст нотатки</label>
                        <textarea id="noteText" rows="4" placeholder ></textarea>
                        <p id="noteError" class="error-text"></p>
                    </div>

                    <div class="buttons">
                        <button type="submit" id="submitBtn" class="btn-submit">Зберегти нотатку</button>
                        <button type="button" id="resetBtn" class="btn-clear">Очистити</button>
                    </div>
                </form>
            </section>

            <section id="list-section">
                <h2>Збережені нотатки</h2>
                
                <div class="toolbar">
                    <input type="text" id="searchInput" placeholder="Пошук за назвою">
                    <button type="button" id="sortBtn">Сортувати (А-Я)</button>
                </div>

                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th
                            click="sortNote('course')"
                            style="cursor: pointer;">Дисципліна</th>
                            <th 
                            click="sortNote('title')"
                            style="cursor: pointer;">Назва</th>
                            <th
                                click="sortNote('note')"
                                style="cursor: pointer;">Зміст</th>
                            <th>Дії</th>
                                </tr>    
                        </tr>
                    </thead>
                    <tbody id="itemsTableBody"></tbody>
                </table>
            </section>

        </main>
    </div>
</body>
</html>
